name: Build and Push Discord Bot

on:
  push:
    branches:
      - main
      - feature/discord-AI_bot  # 💡 feature 브랜치도 포함하여 개발 중인 기능이 푸시될 때마다 빌드
    # 💡 핵심: 아래 경로의 파일이 변경될 때만 이 워크플로우가 실행됩니다.
    paths:
      - 'aiops/discord-bot/**'

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and Push Docker Image
        uses: docker/build-push-action@v5
        with:
          # 봇 소스 코드가 있는 위치
          context: ./aiops/discord-bot
          push: true
          # 💡 시크릿 조합: 유저ID/레포명:태그
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/${{ secrets.DOCKERHUB_REPO_BOT }}:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/${{ secrets.DOCKERHUB_REPO_BOT }}:${{ github.sha }}